<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartBooks — Smarter Accounting. Stronger Business.</title>
<style>
  :root{
    /* SmartBooks brand palette */
    --blue:#1A56DB;        /* primary blue from logo */
    --blue-dark:#1240A8;
    --blue-soft:#EBF2FF;
    --green:#22C55E;       /* accent green from logo */
    --green-dark:#16A34A;
    --green-soft:#DCFCE7;
    --income:#16A34A;
    --income-soft:#DCFCE7;
    --expense:#DC2626;
    --expense-soft:#FEE2E2;
    --neutral-50:#F8FAFC;
    --neutral-100:#F1F5F9;
    --neutral-200:#E2E8F0;
    --neutral-300:#CBD5E1;
    --neutral-500:#64748B;
    --neutral-700:#334155;
    --neutral-900:#0F172A;
    --white:#FFFFFF;
    --card:#FFFFFF;
    --ink:var(--neutral-900);
    --ink-soft:var(--neutral-500);
    --paper:var(--neutral-50);
    --border:var(--neutral-200);
    --shadow:0 1px 4px rgba(15,23,42,0.07), 0 4px 16px rgba(15,23,42,0.05);
    --shadow-sm:0 1px 3px rgba(15,23,42,0.08);
    --radius:10px;
    --radius-sm:6px;
    --font-body:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --font-mono:'SF Mono','IBM Plex Mono',Consolas,monospace;
  }
  [data-theme="dark"]{
    --blue:#3B82F6;
    --blue-dark:#2563EB;
    --blue-soft:#1E3A5F;
    --green:#4ADE80;
    --green-dark:#22C55E;
    --green-soft:#14532D;
    --income:#4ADE80;
    --income-soft:#14532D;
    --expense:#F87171;
    --expense-soft:#450A0A;
    --neutral-50:#0F172A;
    --neutral-100:#1E293B;
    --neutral-200:#334155;
    --neutral-300:#475569;
    --neutral-500:#94A3B8;
    --neutral-700:#CBD5E1;
    --neutral-900:#F1F5F9;
    --white:#1E293B;
    --card:#1E293B;
    --ink:#F1F5F9;
    --ink-soft:#94A3B8;
    --paper:#0F172A;
    --border:#334155;
    --shadow:0 1px 4px rgba(0,0,0,0.3),0 4px 16px rgba(0,0,0,0.2);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100vh;}
  body{font-family:var(--font-body);background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5;}

  /* ===== SIDEBAR LAYOUT ===== */
  .app-shell{display:flex;min-height:100vh;}

  /* Sidebar */
  .sidebar{
    width:220px;flex-shrink:0;background:var(--neutral-900);
    display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:60;
    transition:transform .25s;
  }
  [data-theme="dark"] .sidebar{background:#0B1222;border-right:1px solid var(--border);}

  .sidebar-logo{
    padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .sidebar-logo img{width:140px;height:auto;display:block;}
  .sidebar-logo .tagline-sb{font-size:10px;color:rgba(255,255,255,.45);margin-top:6px;letter-spacing:.3px;}

  .sidebar-nav{flex:1;padding:12px 0;overflow-y:auto;}
  .nav-section-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
    color:rgba(255,255,255,.35);padding:12px 18px 4px;font-weight:600;}
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:10px 18px;
    color:rgba(255,255,255,.65);font-size:13.5px;font-weight:500;cursor:pointer;
    border:none;background:none;width:100%;text-align:left;
    transition:background .15s,color .15s;border-radius:0;
  }
  .nav-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;}
  .nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
  .nav-item.active{
    background:linear-gradient(90deg,rgba(59,130,246,.25),rgba(34,197,94,.1));
    color:#fff;border-left:3px solid var(--blue);padding-left:15px;
  }
  .nav-item.active svg{stroke:var(--green);}

  .sidebar-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);}
  .sidebar-footer .btn-row{gap:6px;}

  /* Top bar actions (theme/lang) in sidebar footer */
  .foot-btn{
    flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
    color:rgba(255,255,255,.8);border-radius:var(--radius-sm);padding:7px 8px;
    cursor:pointer;font-size:12px;font-weight:600;text-align:center;
  }
  .foot-btn:hover{background:rgba(255,255,255,.15);}

  /* Mobile header */
  .mobile-header{
    display:none;background:var(--neutral-900);color:#fff;padding:12px 16px;
    align-items:center;justify-content:space-between;position:sticky;top:0;z-index:55;
  }
  .mobile-logo{height:28px;}
  .hamburger{background:none;border:none;color:#fff;cursor:pointer;padding:4px;}

  /* Content area */
  .content{margin-left:220px;flex:1;min-width:0;}
  .content-inner{max-width:1060px;padding:28px 28px 60px;}

  /* Topbar inside content */
  .topbar{
    background:var(--white);border-bottom:1px solid var(--border);
    padding:14px 28px;display:flex;align-items:center;justify-content:space-between;
    box-shadow:var(--shadow-sm);position:sticky;top:0;z-index:40;
  }
  .topbar-title{font-size:17px;font-weight:700;color:var(--ink);}
  .topbar-sub{font-size:12px;color:var(--ink-soft);margin-top:1px;}
  [data-theme="dark"] .topbar{background:var(--card);border-color:var(--border);}

  /* Views */
  .view{display:none;padding:24px 28px 60px;}
  .view.active{display:block;animation:fadeIn .18s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:translateY(0);}}

  /* ===== STAT CARDS ===== */
  .stat-grid{display:grid;gap:16px;grid-template-columns:repeat(3,1fr);margin-bottom:24px;}
  @media(max-width:760px){.stat-grid{grid-template-columns:1fr;}}
  .stat-card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:20px;box-shadow:var(--shadow-sm);
  }
  .stat-card.primary{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-dark) 100%);border:none;color:#fff;}
  .stat-card .stat-label{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;}
  .stat-card.primary .stat-label{color:rgba(255,255,255,.75);}
  .stat-card .stat-value{font-size:24px;font-weight:700;font-family:var(--font-mono);line-height:1.1;}
  .stat-card.primary .stat-value{color:#fff;}
  .stat-card .stat-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:700;margin-top:8px;}
  .stat-badge.profit{background:var(--green-soft);color:var(--green-dark);}
  .stat-badge.loss{background:var(--expense-soft);color:var(--expense);}
  .stat-card.primary .stat-badge{background:rgba(255,255,255,.2);color:#fff;}

  /* ===== CARDS ===== */
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);}
  .card-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .card-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .card-title .dot.blue{background:var(--blue);}
  .card-title .dot.green{background:var(--green);}
  .grid2{display:grid;gap:16px;grid-template-columns:1fr 1fr;}
  @media(max-width:720px){.grid2{grid-template-columns:1fr;}}

  /* ===== BUTTONS ===== */
  .btn{font-family:var(--font-body);font-weight:600;font-size:13px;padding:8px 16px;
    border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);
    color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:6px;
    transition:all .15s;}
  .btn:hover{border-color:var(--blue);color:var(--blue);}
  .btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
  .btn.primary:hover{background:var(--blue-dark);border-color:var(--blue-dark);}
  .btn.success{background:var(--green);color:#fff;border-color:var(--green);}
  .btn.success:hover{background:var(--green-dark);}
  .btn.income-btn{background:var(--income-soft);color:var(--income);border-color:var(--income);}
  .btn.income-btn:hover{background:var(--income);color:#fff;}
  .btn.expense-btn{background:var(--expense-soft);color:var(--expense);border-color:var(--expense);}
  .btn.expense-btn:hover{background:var(--expense);color:#fff;}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--ink-soft);padding:6px 8px;}
  .btn.ghost:hover{color:var(--blue);background:var(--blue-soft);}
  .btn.sm{font-size:12px;padding:5px 10px;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

  /* ===== FORMS ===== */
  label.field-label{font-size:12px;font-weight:600;color:var(--neutral-700);display:block;margin-bottom:5px;letter-spacing:.2px;}
  [data-theme="dark"] label.field-label{color:var(--neutral-500);}
  input,select,textarea{
    font-family:var(--font-body);font-size:13.5px;padding:8px 11px;
    border:1px solid var(--border);border-radius:var(--radius-sm);
    background:var(--white);color:var(--ink);width:100%;
    transition:border-color .15s,box-shadow .15s;
  }
  [data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--neutral-100);}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.12);}
  .field{margin-bottom:14px;}
  .field-row{display:flex;gap:12px;flex-wrap:wrap;}
  .field-row .field{flex:1;min-width:110px;}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:4px;}

  /* ===== TABLES ===== */
  .table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);}
  table.data-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--card);}
  table.data-table th{
    text-align:left;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
    color:var(--ink-soft);padding:11px 14px;background:var(--neutral-50);
    border-bottom:1px solid var(--border);}
  [data-theme="dark"] table.data-table th{background:var(--neutral-100);}
  table.data-table td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
  table.data-table tbody tr:last-child td{border-bottom:none;}
  table.data-table tbody tr:hover{background:var(--blue-soft);}
  [data-theme="dark"] table.data-table tbody tr:hover{background:rgba(59,130,246,.08);}
  td.num,th.num{text-align:right;font-family:var(--font-mono);}
  .amt-income{color:var(--income);font-weight:700;}
  .amt-expense{color:var(--expense);font-weight:700;}

  /* ===== PILLS ===== */
  .pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.3px;gap:4px;}
  .pill.income{background:var(--income-soft);color:var(--income);}
  .pill.expense{background:var(--expense-soft);color:var(--expense);}
  .pill.status-paid{background:var(--income-soft);color:var(--income);}
  .pill.status-unpaid{background:#FEF3C7;color:#92400E;}
  .pill.status-draft{background:var(--neutral-100);color:var(--neutral-500);}
  .pill::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}

  /* ===== BARS ===== */
  .bar-row{display:grid;grid-template-columns:150px 1fr 100px;align-items:center;gap:12px;margin-bottom:12px;font-size:13px;}
  .bar-track{background:var(--neutral-100);border-radius:999px;height:8px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:999px;transition:width .4s ease;}
  .bar-fill.expense{background:linear-gradient(90deg,var(--expense),#F87171);}
  .bar-fill.income{background:linear-gradient(90deg,var(--blue),var(--green));}
  @media(max-width:520px){.bar-row{grid-template-columns:80px 1fr 70px;font-size:12px;}}

  /* ===== MODAL ===== */
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(2px);
    display:none;align-items:flex-start;justify-content:center;z-index:100;padding:20px 14px;overflow-y:auto;}
  .modal-bg.open{display:flex;}
  .modal{background:var(--card);border-radius:12px;max-width:520px;width:100%;
    padding:24px;box-shadow:0 20px 60px rgba(15,23,42,.2);border:1px solid var(--border);}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .modal-header h3{font-size:17px;font-weight:700;color:var(--ink);}

  /* ===== INVOICE LAYOUT ===== */
  .inv-layout{display:grid;grid-template-columns:400px 1fr;gap:20px;}
  @media(max-width:880px){.inv-layout{grid-template-columns:1fr;}}
  .inv-preview{background:#fff;color:#1a1a2e;border-radius:var(--radius);padding:28px;
    box-shadow:0 2px 20px rgba(0,0,0,.1);min-height:380px;font-family:var(--font-body);border:1px solid #e8edf2;}
  .inv-preview .inv-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:18px;}
  .inv-preview .doc-stamp{
    display:inline-block;background:var(--blue);color:#fff;padding:5px 14px;
    border-radius:4px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
  .inv-preview h3{font-size:18px;font-weight:800;color:#0F172A;margin:0 0 3px;}
  .inv-preview table{width:100%;border-collapse:collapse;margin:14px 0;font-size:12.5px;}
  .inv-preview table th{border-bottom:2px solid #E2E8F0;padding:6px 5px;text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:#64748B;}
  .inv-preview table td{border-bottom:1px solid #F1F5F9;padding:7px 5px;}
  .inv-preview .totals{width:220px;margin-left:auto;font-size:12.5px;}
  .inv-preview .totals div{display:flex;justify-content:space-between;padding:4px 0;color:#475569;}
  .inv-preview .totals .grand{font-weight:800;font-size:16px;color:#0F172A;border-top:2px solid #0F172A;padding-top:8px;margin-top:4px;}
  .inv-preview .qr-box{display:flex;align-items:center;gap:12px;margin-top:16px;padding:12px;background:#F8FAFC;border-radius:8px;}
  .inv-preview .qr-box img{width:80px;height:80px;object-fit:contain;}
  .inv-list-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .inv-list-item:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(26,86,219,.08);}

  /* ===== MISC ===== */
  .row-between{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
  .section-title{font-size:16px;font-weight:700;color:var(--ink);}
  .section-sub{font-size:13px;color:var(--ink-soft);margin-top:2px;}
  .empty-state{text-align:center;padding:48px 20px;color:var(--ink-soft);}
  .empty-icon{width:56px;height:56px;background:var(--blue-soft);border-radius:50%;
    display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
  .empty-icon svg{width:24px;height:24px;stroke:var(--blue);fill:none;stroke-width:2;}
  .img-thumb{width:34px;height:34px;object-fit:cover;border-radius:6px;border:1px solid var(--border);}
  .logo-preview,.qr-preview{width:80px;height:60px;object-fit:contain;border:1px solid var(--border);border-radius:8px;padding:6px;background:#fff;margin-top:8px;}
  .danger-zone{border:1px solid var(--expense-soft);background:var(--expense-soft);border-radius:var(--radius);padding:16px;margin-top:12px;}
  [data-theme="dark"] .danger-zone{background:var(--expense-soft);}
  .file-btn{display:inline-block;cursor:pointer;}
  .file-btn input{display:none;}
  .divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--neutral-900);color:#fff;padding:11px 22px;border-radius:8px;
    font-size:13px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;
    box-shadow:0 4px 20px rgba(0,0,0,.25);white-space:nowrap;}
  [data-theme="dark"] .toast{background:var(--blue);}
  .toast.show{opacity:1;}
  footer.app-foot{padding:16px 28px;font-size:12px;color:var(--ink-soft);text-align:center;}

  /* ===== MOBILE ===== */
  @media(max-width:768px){
    .sidebar{transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .mobile-header{display:flex;}
    .content{margin-left:0;}
    .view{padding:16px 14px 60px;}
    .topbar{display:none;}
    .content-inner{padding:16px 14px 60px;}
  }
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:55;}
  .sidebar-overlay.show{display:block;}

  @media print{
    .sidebar,.mobile-header,.topbar,footer,.no-print{display:none!important;}
    .content{margin-left:0;}
    .view{padding:0;}
  }
</style>
</head>

        <svg viewBox="0 0 24 24"><path d="M6 2h9l4 4v16H6z"/><path d="M15 2v4h4"/><line x1="9" y1="12" x2="17" y2="12"/><line x1="9" y1="16" x2="14" y2="16"/></svg>
        <span data-i18n="nav.invoices">Invoices</span>
      </button>
      <div class="nav-section-label" style="margin-top:8px;">Analytics</div>
      <button class="nav-item" data-view="reports">
        <svg viewBox="0 0 24 24"><line x1="4" y1="21" x2="4" y2="11"/><line x1="11" y1="21" x2="11" y2="5"/><line x1="18" y1="21" x2="18" y2="14"/></svg>
        <span data-i18n="nav.reports">Reports</span>
      </button>
      <div class="nav-section-label" style="margin-top:8px;">System</div>
      <button class="nav-item" data-view="settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span data-i18n="nav.settings">Settings</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="btn-row">
        <button class="foot-btn" id="langToggle">EN</button>
        <button class="foot-btn" id="themeToggle">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/></svg>

        </button>
      </div>
      <div style="font-size:10px;color:rgba(255,255,255,.3);margin-top:10px;">SmartBooks v2.0 · Offline</div>
    </div>
  </aside>

  <!-- Main content -->
  <div class="content">
    <section class="view active" id="view-dashboard"></section>
    <section class="view" id="view-transactions"></section>
    <section class="view" id="view-invoices"></section>
    <section class="view" id="view-reports"></section>
    <section class="view" id="view-settings"></section>
  </div>
</div>

<footer class="app-foot no-print">
  <span data-i18n="footer">SmartBooks — fully offline. Your data stays on this device only.</span>
</footer>

<!-- Transaction Modal -->
<div class="modal-bg" id="txModalBg">
  <div class="modal">
    <div class="modal-header">
      <h3 id="txModalTitle" data-i18n="tx.add">Add transaction</h3>
      <button class="btn ghost" id="txModalClose">✕</button>
    </div>
    <form id="txForm">
      <input type="hidden" id="txId">
      <div class="field-row">
        <div class="field">
          <label class="field-label" data-i18n="tx.type">Type</label>
          <select id="txType">
            <option value="income" data-i18n="tx.income">Income (Money In)</option>
            <option value="expense" data-i18n="tx.expense">Expense (Money Out)</option>
          </select>
        </div>
        <div class="field">
          <label class="field-label" data-i18n="tx.date">Date</label>
          <input type="date" id="txDate" required>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label" data-i18n="tx.amount">Amount (RM)</label>
          <input type="number" id="txAmount" step="0.01" min="0" required placeholder="0.00">
        </div>
        <div class="field">
          <label class="field-label" data-i18n="tx.method">Payment method</label>
          <select id="txMethod"></select>
        </div>
      </div>
      <div class="field">
        <label class="field-label" data-i18n="tx.category">Category</label>
        <select id="txCategory"></select>
        <div id="txNewCatWrap" style="display:none;margin-top:8px;">
          <input type="text" id="txNewCat" placeholder="New category name">
        </div>
      </div>
      <div class="field">
        <label class="field-label" data-i18n="tx.desc">Description / notes</label>
        <input type="text" id="txDesc" placeholder="e.g. Sale to walk-in customer">
      </div>
      <div class="field">
        <label class="field-label" data-i18n="tx.photo">Receipt photo (optional)</label>
        <label class="file-btn btn sm">
          <span data-i18n="tx.choosePhoto">Choose photo</span>
          <input type="file" id="txPhoto" accept="image/*">
        </label>
        <div id="txPhotoPreviewWrap"></div>
      </div>
      <hr class="divider">
      <div class="btn-row">
        <button type="submit" class="btn primary" data-i18n="common.save">Save</button>
        <button type="button" class="btn ghost" id="txDeleteBtn" style="display:none;color:var(--expense);" data-i18n="common.delete">Delete</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="recehkira.js"></script>
</body>
</html>
